<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strength Pro - Workout App</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,800;1,900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
tailwind.config = {
theme: {
extend: {
colors: {
charcoal: {
950: '#0B0B0C',
900: '#121214',
800: '#1A1A1E',
700: '#26262B',
},
volt: '#CFFF5E', /* Verde Neón */
},
fontFamily: {
barlow: ['"Barlow Condensed"', 'sans-serif'],
inter: ['Inter', 'sans-serif'],
}
}
}
}
</script>
<style>
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0B0B0C; }
::-webkit-scrollbar-thumb { background: #26262B; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #CFFF5E; }

.text-glow { text-shadow: 0 0 30px rgba(207, 255, 94, 0.3); }
.box-glow:hover { box-shadow: 0 0 20px rgba(207, 255, 94, 0.1); }

.hidden-block { display: none !important; }
</style>
</head>
<body class="bg-charcoal-950 text-white font-inter antialiased min-h-screen flex flex-col selection:bg-volt selection:text-black">

<!-- HEADER -->
<header class="border-b border-charcoal-700 bg-charcoal-950/80 backdrop-blur sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2 cursor-pointer" onclick="changeBlock('home')">
<span class="font-barlow text-3xl font-black italic tracking-wider text-volt">STRENGTH</span>
<span class="text-xs uppercase bg-white text-black px-2 py-0.5 rounded font-inter font-bold tracking-widest">PRO</span>
</div>
</div>
</header>

<main class="flex-grow flex flex-col w-full max-w-6xl mx-auto px-6 py-12 relative">

<!-- ==========================================
BLOQUE 1: HOME PAGE (Dinámico por día)
========================================== -->
<section id="block-home" class="flex-grow flex flex-col justify-center items-center text-center space-y-4 animate-fade-in">
<!-- Día gigantesco -->
<h1 id="home-day-massive" class="font-barlow text-[100px] md:text-[180px] lg:text-[220px] font-black italic text-white leading-none tracking-tighter uppercase text-glow drop-shadow-2xl">
<!-- Se llena por JS -->
</h1>

<!-- Fecha debajo del día -->
<p id="home-date" class="text-volt font-inter text-xl md:text-2xl font-bold uppercase tracking-[0.2em] mb-10 pb-8">
<!-- Se llena por JS -->
</p>

<div class="pt-8 w-full max-w-md">
<button onclick="handleStartClick()" class="w-full bg-volt text-charcoal-950 hover:bg-white hover:text-black py-5 px-8 font-barlow text-3xl font-black italic tracking-wider uppercase transition-all duration-300 shadow-[0_0_20px_rgba(207,255,94,0.3)]">
COMENZAR RUTINA <i class="fa-solid fa-arrow-right ml-2"></i>
</button>
</div>
</section>

<!-- ==========================================
BLOQUE 2: OFF-DAY (Días de Descanso)
========================================== -->
<section id="block-offday" class="hidden-block flex-grow flex flex-col justify-center items-center text-center space-y-8 animate-fade-in">
<h2 class="font-barlow text-5xl md:text-7xl font-black italic text-gray-400 uppercase tracking-tight leading-none">
HOY NO ES DÍA DE
<span class="text-white">ENTRENAMIENTO</span>
</h2>
<p class="text-gray-400 font-inter text-lg max-w-md">Puedes tomarte el día para recuperar, o agregar una rutina manualmente presionando el botón abajo.</p>

<div class="pt-10">
<!-- Botón redondo con '+' (Volt) -->
<button onclick="changeBlock('choose')" class="w-24 h-24 rounded-full bg-volt text-charcoal-950 hover:bg-white text-5xl flex items-center justify-center mx-auto transition-all duration-300 shadow-[0_0_30px_rgba(207,255,94,0.4)] hover:scale-110">
<i class="fa-solid fa-plus"></i>
</button>
</div>
</section>

<!-- ==========================================
BLOQUE 3: SELECTOR DE RUTINA MANUAL
========================================== -->
<section id="block-choose" class="hidden-block flex-grow flex flex-col justify-center items-center text-center space-y-6 animate-fade-in w-full max-w-2xl mx-auto">
<h2 class="font-barlow text-4xl md:text-5xl font-black italic text-white uppercase tracking-tight mb-4">SELECCIONA UNA RUTINA</h2>

<button onclick="selectRoutine('Lunes')" class="w-full bg-charcoal-900 border border-charcoal-700 hover:border-volt p-6 flex flex-col items-center justify-center box-glow transition-all">
<span class="font-barlow text-3xl font-black italic text-volt tracking-widest">LUNES</span>
<span class="text-gray-300 font-inter font-bold">PECHO + TRÍCEPS</span>
</button>

<button onclick="selectRoutine('Miércoles')" class="w-full bg-charcoal-900 border border-charcoal-700 hover:border-volt p-6 flex flex-col items-center justify-center box-glow transition-all">
<span class="font-barlow text-3xl font-black italic text-volt tracking-widest">MIÉRCOLES</span>
<span class="text-gray-300 font-inter font-bold">ESPALDA + BÍCEPS</span>
</button>

<button onclick="selectRoutine('Viernes')" class="w-full bg-charcoal-900 border border-charcoal-700 hover:border-volt p-6 flex flex-col items-center justify-center box-glow transition-all">
<span class="font-barlow text-3xl font-black italic text-volt tracking-widest">VIERNES</span>
<span class="text-gray-300 font-inter font-bold">PIERNAS + HOMBROS + CORE</span>
</button>

<button onclick="changeBlock('home')" class="mt-6 text-gray-500 hover:text-white font-inter font-bold uppercase tracking-wide transition">
Cancelar
</button>
</section>

<!-- ==========================================
BLOQUE 4: INTRO DEL DÍA
========================================== -->
<section id="block-intro" class="hidden-block flex-grow flex flex-col justify-center items-center text-center space-y-8 animate-fade-in">
<div class="inline-block border-2 border-volt text-volt font-inter font-bold px-6 py-2 tracking-[0.3em] uppercase text-sm mb-4">
VISIÓN GENERAL
</div>

<h2 id="intro-day-title" class="font-barlow text-6xl md:text-8xl font-black italic text-white uppercase tracking-tight"></h2>

<p id="intro-focus" class="text-2xl md:text-4xl text-gray-300 font-inter font-black uppercase tracking-wide border-b border-charcoal-700 pb-8"></p>

<div class="flex flex-col sm:flex-row gap-4 w-full max-w-2xl pt-6">
<button onclick="changeBlock('home')" class="flex-1 bg-charcoal-800 border border-charcoal-700 hover:bg-charcoal-700 text-white py-4 px-6 font-barlow text-2xl font-bold uppercase transition-all">
<i class="fa-solid fa-chevron-left mr-2"></i> VOLVER
</button>
<button onclick="changeBlock('warmup')" class="flex-[2] bg-volt text-charcoal-950 hover:bg-white py-4 px-6 font-barlow text-3xl font-black italic tracking-wider uppercase transition-all shadow-[0_0_15px_rgba(207,255,94,0.2)]">
INICIAR RUTINA <i class="fa-solid fa-bolt ml-2"></i>
</button>
</div>
</section>

<!-- ==========================================
BLOQUE 5: WARM-UP (PREPARACIÓN)
========================================== -->
<section id="block-warmup" class="hidden-block w-full max-w-4xl mx-auto space-y-10 animate-fade-in">
<div class="border-l-8 border-volt pl-6 py-2">
<h2 class="font-barlow text-5xl md:text-6xl font-black italic text-white uppercase tracking-tight">FASE DE PREPARACIÓN Y RECUPERACIÓN</h2>
<p class="text-volt font-inter font-bold tracking-widest mt-2 uppercase">WARM-UP DEL DÍA</p>
</div>

<div id="warmup-container" class="grid gap-4">
<!-- Se llena con JS -->
</div>

<div class="flex flex-col sm:flex-row gap-4 pt-10 border-t border-charcoal-700">
<button onclick="changeBlock('home')" class="flex-1 bg-charcoal-800 border border-charcoal-700 hover:border-volt hover:text-volt text-white py-4 px-6 font-barlow text-2xl font-bold uppercase transition-all flex items-center justify-center gap-3">
<i class="fa-solid fa-house"></i> HOME
</button>
<button onclick="changeBlock('strength')" class="flex-[2] bg-volt text-charcoal-950 hover:bg-white py-4 px-6 font-barlow text-3xl font-black italic tracking-wider uppercase transition-all text-center shadow-[0_0_15px_rgba(207,255,94,0.2)]">
IR A BLOQUE DE FUERZA <i class="fa-solid fa-arrow-right ml-2"></i>
</button>
</div>
</section>

<!-- ==========================================
BLOQUE 6: BLOQUE DE FUERZA PRINCIPAL
========================================== -->
<section id="block-strength" class="hidden-block w-full max-w-5xl mx-auto space-y-10 animate-fade-in">
<div class="border-l-8 border-volt pl-6 py-2 border-b border-charcoal-700 pb-6">
<h2 class="font-barlow text-5xl md:text-6xl font-black italic text-white uppercase tracking-tight">BLOQUE DE FUERZA PRINCIPAL</h2>
<p id="strength-focus-subtitle" class="text-volt font-inter font-bold tracking-widest mt-2 uppercase"></p>
</div>

<div id="strength-container" class="space-y-6">
<!-- Se llena con JS -->
</div>

<div class="pt-10 border-t border-charcoal-700 mt-10">
<button onclick="completeRoutineAndHome()" class="w-full bg-volt text-charcoal-950 hover:bg-white py-5 px-6 font-barlow text-3xl font-black italic tracking-wider uppercase transition-all shadow-[0_0_20px_rgba(207,255,94,0.3)] flex items-center justify-center gap-3">
<i class="fa-solid fa-check-double"></i> RUTINA COMPLETADA (VOLVER AL HOME)
</button>
</div>
</section>

</main>

<!-- ==========================================
SISTEMA LÓGICO Y DATOS (JS)
========================================== -->
<script>
// BASE DE DATOS DE INSTRUCCIONES
const workoutData = {
'Lunes': {
focus: 'ENFOQUE: PECHO (CHEST) + TRÍCEPS',
warmup: [
{ name: 'Rotaciones de hombros', reps: 'x20' },
{ name: 'Balanceo de brazos', reps: 'x20' },
{ name: 'Flexiones de pared', reps: 'x15' }
],
strength: [
{ name: '1. Press de Pecho', detail: '4 series x 8-12 reps', sets: 4, inst: 'Equipo: Barra Pilates + banda (detrás de la espalda). Postura: acostado boca arriba, rodillas dobladas, pies firmes. Agarre: manos un poco más abiertas que hombros, palmas al frente. Movimiento: empuja arriba y baja lento.' },
{ name: '2. Apertura de Pecho', detail: '3 series x 12-15 reps', sets: 3, inst: 'Banda detrás de espalda. Brazos abiertos, codos ligeramente doblados. Cerrar como abrazo.' },
{ name: '3. Push-up de Rodillas', detail: '3 series x 8-12 reps', sets: 3, inst: 'Tabla, zona azul. Manos apoyadas, rodillas al piso. Baja pecho y empuja.' },
{ name: '4. Extensión Tríceps', detail: '3 series x 10-15 reps', sets: 3, inst: 'Banda pisada con ambos pies. Codos arriba, extiende brazos sobre la cabeza.' },
{ name: '5. Patada de Tríceps', detail: '3 series x 12 por brazo', sets: 3, inst: 'Banda pisada. Torso inclinado, espalda recta. Extiende el brazo hacia atrás.' }
]
},
'Miércoles': {
focus: 'ENFOQUE: ESPALDA (BACK) + BÍCEPS',
warmup: [
{ name: 'Círculos de brazos', reps: 'x20' },
{ name: 'Retracción escapular', reps: 'x15' },
{ name: 'Buenos días (sin peso)', reps: 'x15' }
],
strength: [
{ name: '1. Remo Sentado', detail: '4 series x 10-12 reps', sets: 4, inst: 'Banda por debajo de los pies. Sentado, piernas extendidas, espalda recta. Jala hacia abdomen y aprieta espalda.' },
{ name: '2. Remo con Manijas', detail: '3 series x 12 reps', sets: 3, inst: 'Banda pisada. Rodillas suaves, cadera atrás. Jala hacia cintura.' },
{ name: '3. Pull Apart', detail: '3 series x 15 reps', sets: 3, inst: 'Solo banda con manos. Abre brazos rectos hacia los lados y junta omóplatos.' },
{ name: '4. Curl Bíceps con Barra', detail: '4 series x 10-15 reps', sets: 4, inst: 'Banda pisada. Palmas hacia arriba. Sube y baja de forma controlada.' },
{ name: '5. Curl Martillo', detail: '3 series x 12 reps', sets: 3, inst: 'Utiliza las manijas de las bandas manteniendo las palmas enfrentadas.' }
]
},
'Viernes': {
focus: 'ENFOQUE: PIERNAS + HOMBROS + CORE',
warmup: [
{ name: 'Marcha en sitio', reps: '1 min' },
{ name: 'Sentadillas sin peso', reps: 'x15' },
{ name: 'Puente de glúteos', reps: 'x15' },
{ name: 'Círculos de hombros', reps: 'x20' }
],
strength: [
{ name: '1. Sentadilla con Barra', detail: '4 series x 10-15 reps', sets: 4, inst: 'Banda pisada. Barra a nivel de hombros. Baja cadera atrás y sube apretando glúteos.' },
{ name: '2. Peso Muerto con Barra', detail: '3 series x 10-12 reps', sets: 3, inst: 'Banda pisada. Espalda recta, cadera atrás. Sube realizando fuerza con los glúteos.' },
{ name: '3. Press de Hombros', detail: '4 series x 10-12 reps', sets: 4, inst: 'Banda pisada. Empuja la barra hacia arriba y baja de manera lenta.' },
{ name: '4. Elevaciones Laterales', detail: '3 series x 12-15 reps', sets: 3, inst: 'Manijas, palmas hacia abajo. Sube los brazos rectos hasta la altura de los hombros.' },
{ name: '5. Ab Roller', detail: '3 series x 5-10 reps', sets: 3, inst: 'Rodillas en piso. Mantén el abdomen apretado al estirarte y controla el movimiento.' }
]
}
};

const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
const workoutDays = ['Lunes', 'Miércoles', 'Viernes'];

let actualDayName = '';
let activeDay = '';

// INICIALIZACIÓN
window.onload = () => {
const dateObj = new Date();
actualDayName = dayNames[dateObj.getDay()];
activeDay = actualDayName;

// Render UI
document.getElementById('home-day-massive').innerText = actualDayName.toUpperCase();

const options = { year: 'numeric', month: 'long', day: 'numeric' };
document.getElementById('home-date').innerText = dateObj.toLocaleDateString('es-ES', options).toUpperCase();
};

// LÓGICA DE BOTÓN "COMENZAR RUTINA"
function handleStartClick() {
if (workoutDays.includes(actualDayName)) {
activeDay = actualDayName;
renderData();
changeBlock('intro');
} else {
changeBlock('offday');
}
}

// SELECTOR DE RUTINA MANUAL (+)
function selectRoutine(day) {
activeDay = day;
renderData();
changeBlock('intro');
}

// NAVEGACIÓN
function changeBlock(blockId) {
['home', 'offday', 'choose', 'intro', 'warmup', 'strength'].forEach(id => {
document.getElementById(block-${id}).classList.add('hidden-block');
});
document.getElementById(block-${blockId}).classList.remove('hidden-block');
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function completeRoutineAndHome() {
changeBlock('home');
}

// RENDERIZADO DE DATOS (INSTRUCCIONES Y TIMERS)
function renderData() {
const data = workoutData[activeDay];

// Intro
document.getElementById('intro-day-title').innerText = RUTINA: ${activeDay.toUpperCase()};
document.getElementById('intro-focus').innerText = data.focus;

// Warm-up
let warmupHTML = '';
data.warmup.forEach(item => {
warmupHTML += <div class="bg-charcoal-900 border border-charcoal-700 p-6 flex justify-between items-center hover:border-volt/50 transition box-glow"> <h3 class="font-inter font-bold text-white text-xl uppercase tracking-wide">${item.name}</h3> <span class="font-barlow text-3xl font-black italic text-volt tracking-widest">${item.reps}</span> </div>;
});
document.getElementById('warmup-container').innerHTML = warmupHTML;

// Strength (Con Instrucciones y Timer)
document.getElementById('strength-focus-subtitle').innerText = data.focus;
let strengthHTML = '';

data.strength.forEach((item) => {
// Generar botones de series dinámicamente
